<!DOCTYPE html><html lang="fa"><head><meta charset="UTF-8"><title>چت هوشمند</title>
<style>body{font-family:Tahoma;max-width:600px;margin:2rem auto;direction:rtl}
#chat-box{border:1px solid #ccc;padding:1rem;height:300px;overflow-y:auto;margin-bottom:1rem;background:#fafafa}
.user{color:#0066cc}.assistant{color:#2d6a4f}textarea{width:100%}</style></head>
<body><h2>چت هوشمند</h2><div id="chat-box"></div>
<input type="hidden" id="sessionId" value="demo">
<textarea id="userInput" rows="2" placeholder="پیام خود را بنویسید..."></textarea><br>
<button onclick="send()">ارسال</button>
<script>
async function send(){
  const msg=document.getElementById('userInput').value.trim();
  const sid=document.getElementById('sessionId').value;
  if(!msg)return;
  append('user',msg);
  document.getElementById('userInput').value='';
  try{
    const res=await fetch('/api/chat/message',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,sessionId:sid})
    });
    const data=await res.json();
    append('assistant',data.response||'بدون پاسخ');
  }catch(e){
    append('assistant','🚫 خطا در ارتباط');
  }
}
function append(role,text){
  const box=document.getElementById('chat-box');
  const d=document.createElement('div');
  d.className=role;
  d.textContent=(role==='assistant'?'🤖 ':'👤 ')+text;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
}
</script></body></html>
